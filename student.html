<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>시뮬레이션</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh}
#topbar{background:#fff;border-bottom:1px solid #e0e0dd;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#666;position:sticky;top:0;z-index:50}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-session{background:#f0f0fe;color:#3C3489;padding:3px 10px;border-radius:4px;font-weight:600}
.tb-name{font-weight:600;color:#1a1a1a}
.conn{display:flex;align-items:center;gap:5px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#ddd}
.conn-dot.ok{background:#1D9E75;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}

/* 이름 입력 오버레이 */
#namePrompt{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999}
.prompt-box{background:#fff;border-radius:16px;padding:32px;max-width:320px;width:90%;text-align:center}
.prompt-box h2{font-size:18px;font-weight:700;margin-bottom:6px}
.prompt-box p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.5}
.prompt-box input{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none;margin-bottom:14px}
.prompt-box input:focus{border-color:#7F77DD}
.prompt-box button{width:100%;padding:11px;border-radius:8px;border:none;background:#3C3489;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.prompt-box button:hover{background:#534AB7}

/* 로딩 */
#loadingMsg{text-align:center;padding:80px 20px;color:#aaa;font-size:14px;display:none}
#loadingMsg .spin{display:inline-block;width:24px;height:24px;border:2px solid #ddd;border-top-color:#7F77DD;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 시뮬레이션 컨테이너 */
#simContainer{max-width:680px;margin:16px auto;padding:0 16px 32px}

/* 시뮬레이션 내부에서 사용하는 공통 스타일 */
#simContainer .card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
#simContainer h2{font-size:16px;font-weight:700;margin-bottom:14px;text-align:center}
#simContainer .sr{display:flex;align-items:center;gap:12px;margin-bottom:10px}
#simContainer .sl{font-size:14px;font-weight:500;min-width:65px;color:#666}
#simContainer .sv{font-size:15px;font-weight:600;min-width:22px;text-align:right}
#simContainer input[type=range]{flex:1;height:4px;cursor:pointer}
#simContainer #fb{border-radius:10px;padding:12px 16px;margin:12px 0;text-align:center;font-size:15px;font-weight:600;line-height:1.8}
#simContainer #ar{position:relative;width:100%;height:440px;background:#fafaf8;border:1px solid #e8e8e5;border-radius:12px;overflow:hidden;touch-action:none}
#simContainer .pc{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;touch-action:none;border-radius:0;transition:box-shadow .12s}
#simContainer .pc.dg{cursor:grabbing;z-index:50;box-shadow:0 8px 28px rgba(0,0,0,.2)}
#simContainer .pcl{font-size:12px;font-weight:600;pointer-events:none}
#simContainer .pcv{font-size:11px;pointer-events:none;opacity:.7;margin-top:2px}
#simContainer .rot-btn{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,255,255,.7);background:rgba(255,255,255,.55);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;z-index:10;transition:background .12s,transform .15s;touch-action:none}
#simContainer .rot-btn:hover{background:rgba(255,255,255,.85);transform:rotate(90deg)}
#simContainer .btns{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
#simContainer .btn{font-size:13px;padding:7px 18px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#555;font-family:inherit}
#simContainer .btn:hover{background:#f5f5f5}
#simContainer canvas#opc{position:absolute;inset:0;pointer-events:none}
#simContainer .legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;font-size:12px;color:#888}
#simContainer .li{display:flex;align-items:center;gap:4px}
#simContainer .ld{width:11px;height:11px;border-radius:3px;flex-shrink:0}
#simContainer .hint{text-align:center;font-size:12px;color:#aaa;margin-top:6px}
</style>
</head>
<body>

<div id="namePrompt">
  <div class="prompt-box">
    <h2>수학 시뮬레이션</h2>
    <p>이름을 입력하고 시작하세요</p>
    <input type="text" id="nameInput" placeholder="이름 입력" maxlength="20">
    <button id="nameSubmit">시작하기</button>
  </div>
</div>

<div id="topbar">
  <div class="tb-l">
    <span class="tb-session" id="tbSession">—</span>
    <span class="tb-name" id="tbName"></span>
  </div>
  <div class="conn">
    <span class="conn-dot" id="connDot"></span>
    <span id="connText">연결 중...</span>
  </div>
</div>

<div id="loadingMsg">
  <div class="spin"></div>
  <div>시뮬레이션 불러오는 중...</div>
</div>

<div id="simContainer"></div>

<script>
var params=new URLSearchParams(location.search);
var sessionId=params.get('session')||'';
var simId=params.get('sim')||'';
var studentName='';
var sbClient=null;
var reportTimer=null;
var lastState='';
var isPreview=params.get('preview')==='1';
var isTeacherPreview=params.get('teacher_preview')==='1';
// 미리보기 모드이면 이름 입력창 즉시 숨김
if(isPreview||isTeacherPreview) document.getElementById('namePrompt').style.display='none';
// 상태 복원 (교사 미리보기용)
// state: URL 파라미터(구버전) 또는 sessionStorage key(신버전)
var _sp=params.get('state');
var _statekey=params.get('statekey');
if(_statekey){
  // teacher가 sessionStorage에 저장한 상태 읽기
  try{
    var _sv=sessionStorage.getItem(_statekey);
    if(_sv) window.initialSimState=JSON.parse(_sv);
    // 사용 후 삭제
    sessionStorage.removeItem(_statekey);
  }catch(e){}
} else if(_sp){
  try{window.initialSimState=JSON.parse(decodeURIComponent(atob(_sp)));}catch(e){}
}

// Supabase 초기화 (teacher.html에서 저장한 키 사용)
// 1순위: URL 파라미터 (학생 링크에 포함된 키)
// 2순위: localStorage (같은 기기에서 teacher.html 열었을 때)
var SB_URL=params.get('su')||localStorage.getItem('sb_url')||'';
var SB_KEY=params.get('sk')||localStorage.getItem('sb_key')||'';

if(SB_URL&&SB_KEY){
  sbClient=supabase.createClient(SB_URL,SB_KEY);
  // 이 기기에도 저장 (다음 접속 편의)
  if(!isTeacherPreview){
    localStorage.setItem('sb_url',SB_URL);
    localStorage.setItem('sb_key',SB_KEY);
  }
}

// 교사 미리보기: 이름/세션 없이 바로 시뮬레이션 로드
if(isTeacherPreview){
  window.reportSimState=function(){};  // 상태 보고 비활성화
  document.getElementById('tbSession').textContent='미리보기';
  document.getElementById('tbName').textContent='교사';
  document.getElementById('connDot').classList.add('ok');
  document.getElementById('connText').textContent='미리보기 모드';
  loadSimulation();
}

// 이름 입력
document.getElementById('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter')submitName();});
document.getElementById('nameSubmit').addEventListener('click',submitName);

// 이름 자동 입력 (URL 파라미터 > 세션 저장값)
var _autoName=params.get('name')||(!isPreview&&localStorage.getItem('sname_'+sessionId))||'';
if(_autoName){
  document.getElementById('nameInput').value=_autoName;
  submitName();
}

async function submitName(){
  var n=document.getElementById('nameInput').value.trim();
  if(!n){document.getElementById('nameInput').focus();return;}
  studentName=n;
  if(sessionId&&!isPreview) localStorage.setItem('sname_'+sessionId,studentName);
  document.getElementById('namePrompt').style.display='none';
  document.getElementById('tbSession').textContent='세션 '+sessionId;
  document.getElementById('tbName').textContent=studentName;
  if(sbClient){
    document.getElementById('connDot').classList.add('ok');
    document.getElementById('connText').textContent=isPreview?'미리보기':'연결됨';
  } else {
    document.getElementById('connText').textContent='오프라인';
  }
  if(isPreview){
    window.reportSimState=function(){};
  } else if(sbClient&&sessionId&&!window.initialSimState){
    // 재접속: Supabase에서 이전 상태 불러와 복원
    try{
      var r=await sbClient.from('sim_states').select('state').eq('session_id',sessionId).eq('student_name',studentName).single();
      if(r.data&&r.data.state&&Object.keys(r.data.state).length){
        window.initialSimState=r.data.state;
        document.getElementById('connText').textContent='이전 활동 복원 중...';
      }
    }catch(e){}
  }
  loadSimulation();
}

// 시뮬레이션 코드를 Supabase에서 불러와 실행
async function loadSimulation(){
  if(!simId){
    document.getElementById('simContainer').innerHTML='<p style="text-align:center;padding:40px;color:#aaa">시뮬레이션 ID가 없습니다. 선생님께 링크를 다시 받으세요.</p>';
    return;
  }
  if(!sbClient){
    document.getElementById('simContainer').innerHTML='<p style="text-align:center;padding:40px;color:#aaa">Supabase 연결 정보가 없습니다.<br>선생님 대시보드(teacher.html)를 먼저 열어 연결 설정을 완료해주세요.</p>';
    return;
  }
  document.getElementById('loadingMsg').style.display='block';
  var r=await sbClient.from('simulations').select('code,title').eq('id',simId).single();
  document.getElementById('loadingMsg').style.display='none';
  if(r.error||!r.data){
    document.getElementById('simContainer').innerHTML='<p style="text-align:center;padding:40px;color:#aaa">시뮬레이션을 불러오지 못했습니다.</p>';
    return;
  }
  document.title=r.data.title+' — 시뮬레이션';
  injectSim(r.data.code);
}

// ── iframe 방식으로 시뮬레이션 실행 ──
// 순수 HTML을 Blob URL로 만들어 iframe에 로드 → 외부 스크립트/Canvas 완전 지원
function injectSim(html){
  var container=document.getElementById('simContainer');
  container.innerHTML='';

  // 전체 HTML이 아닌 경우 기본 구조로 감싸기
  var isFullDoc=/<!DOCTYPE|<html[\s>]/i.test(html);
  var fullHtml=isFullDoc?html:'<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body>'+html+'</body></html>';

  // reportSimState 브릿지 코드 주입 (</body> 직전)
  var initialState=window.initialSimState?JSON.stringify(window.initialSimState):'null';
  var bridge='<script>(function(){'
    +'window.initialSimState='+initialState+';'
    // reportSimState 오버라이드
    +'window.reportSimState=function(state){'
    +'  if(window._isTeacherPreview)return;'  // teacher_preview 모드에서 전송 차단
    +'  try{parent.postMessage({type:"simState",state:state},"*");}catch(e){}'
    +'};'
    // ① 즉시 "접속됨" 신호 전송 (일반 학생 모드에서만)
    // teacher_preview 모드에서는 postMessage 전송 안 함
    +'var _isTeacherPreview=window.location&&window.location.search&&window.location.search.indexOf("teacher_preview=1")>=0;'
    +'if(!_isTeacherPreview){try{parent.postMessage({type:"simAlive"},"*");}catch(e){}}'
    // ② 슬라이더 초기값 전송
    +'function sendInputs(){'
    +'  var inputs={};'
    +'  document.querySelectorAll("input[type=range],select,input[type=number]").forEach(function(el,i){'
    +'    var k=el.id||el.name||("f"+i);'
    +'    inputs[k]=isNaN(parseFloat(el.value))?el.value:parseFloat(el.value);'
    +'  });'
    +'  if(!window._isTeacherPreview) parent.postMessage({type:"simInputs",inputs:inputs},"*");'
    +'}'
    // ③ 슬라이더 변경 감지 (이미 로드됐으면 즉시, 아니면 DOMContentLoaded 후)
    +'function setupListeners(){'
    +'  document.addEventListener("input",function(e){'
    +'    if(e.target.type==="range"||e.target.tagName==="SELECT"||e.target.type==="number"){'
    +'      setTimeout(sendInputs,300);'
    +'    }'
    +'  });'
    +'  document.addEventListener("click",function(e){'
    +'    if(e.target.tagName==="BUTTON") setTimeout(sendInputs,400);'
    +'  });'
    +'  setTimeout(sendInputs,800);' // 초기값 한 번 전송
    +'}'
    +'if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",setupListeners);}else{setupListeners();}'
    // ⑤ initialSimState 복원 (교사 미리보기 시 학생 마지막 상태로 복원)
    +'function restoreState(){'
    +'  var _s=window.initialSimState;if(!_s)return;'
    // 슬라이더 값 복원
    +'  if(_s._inputs){'
    +'    Object.keys(_s._inputs).forEach(function(id){'
    +'      var el=document.getElementById(id);if(!el)return;'
    +'      el.value=_s._inputs[id];'
    +'      el.dispatchEvent(new Event("input",{bubbles:true}));'
    +'      el.dispatchEvent(new Event("change",{bubbles:true}));'
    +'    });'
    +'  }'
    // .pc 조각 위치 복원 (슬라이더 이벤트로 리셋된 후 덮어쓰기)
    +'  if(_s.pos&&_s.pos.length){'
    +'    setTimeout(function(){'
    +'      var arEl=document.getElementById("ar");if(!arEl)return;'
    +'      var ar=arEl.getBoundingClientRect();'
    +'      var aw=ar.width,ah=ar.height;if(!aw||!ah)return;'
    +'      var pieces=arEl.querySelectorAll(".pc");'
    +'      _s.pos.forEach(function(p,i){'
    +'        if(!pieces[i])return;'
    +'        if(p.x!==undefined) pieces[i].style.left=(p.x*aw)+"px";'
    +'        if(p.y!==undefined) pieces[i].style.top=(p.y*ah)+"px";'
    +'      });'
    +'    },400);'
    +'  }'
    +'}'
    +'if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){setTimeout(restoreState,600);});}else{setTimeout(restoreState,600);}'
    // ④ 주기적 캡처: Canvas + .pc 조각 위치
    +'function captureAll(){'
    +'try{'
    +'var canvases=document.querySelectorAll("canvas");'
    +'var cv=null;'
    +'canvases.forEach(function(c){'
    +'  if(c.id==="opc")return;'
    +'  var r=c.getBoundingClientRect();'
    +'  if(r.width>50&&r.height>50)cv=c;'
    +'});'
    +'if(cv){'
    +'  var thumb=document.createElement("canvas");'
    +'  thumb.width=220;thumb.height=140;'
    +'  thumb.getContext("2d").drawImage(cv,0,0,220,140);'
    +'  var d=thumb.toDataURL("image/jpeg",0.75);'
    +'  if(d&&d.length>200)parent.postMessage({type:"simThumb",data:d},"*");'
    +'}'
    +'var arEl=document.getElementById("ar");'
    +'if(arEl){'
    +'  var pieces=arEl.querySelectorAll(".pc");'
    +'  if(pieces.length){'
    +'    var ar=arEl.getBoundingClientRect();'
    +'    var aw=ar.width,ah=ar.height;'
    +'    if(aw>0&&ah>0){'
    +'      var posData=Array.prototype.map.call(pieces,function(el){'
    +'        return{x:(parseFloat(el.style.left)||0)/aw,y:(parseFloat(el.style.top)||0)/ah,w:(parseFloat(el.style.width)||0)/aw,h:(parseFloat(el.style.height)||0)/ah};'
    +'      });'
    +'      var modeVal=typeof curMode!=="undefined"?curMode:"";'
    +'      parent.postMessage({type:"simPieces",pos:posData,mode:modeVal},"*");'
    +'    }'
    +'  }'
    +'}'
    +'}catch(e){}'
    +'}'
    +'setInterval(captureAll,1000);'  // 1초마다 주기적 캡처
    +'document.addEventListener("mouseup",function(){setTimeout(captureAll,150);});'
    +'document.addEventListener("touchend",function(){setTimeout(captureAll,150);});'
    // 초기 로드 후 단계적으로 캡처 시도 (시뮬레이션 초기화 대기)
    +'setTimeout(captureAll,400);'
    +'setTimeout(captureAll,900);'
    +'setTimeout(captureAll,1800);'
    +'})();<\/script>';

  var injected=fullHtml.replace(/<\/body>/i, bridge+'</body>');

  // Blob URL 생성 → iframe 로드
  var blob=new Blob([injected],{type:'text/html'});
  var url=URL.createObjectURL(blob);

  var iframe=document.createElement('iframe');
  iframe.id='simFrame';
  iframe.src=url;
  iframe.style.cssText='width:100%;min-height:500px;border:none;display:block;background:#fff';
  iframe.allow='';
  iframe.setAttribute('scrolling','yes');

  // iframe 높이 자동 조절
  iframe.onload=function(){
    URL.revokeObjectURL(url); // 메모리 해제
    setTimeout(function(){
      try{
        var h=iframe.contentDocument.body.scrollHeight;
        if(h>200) iframe.style.height=h+'px';
      }catch(e){}
    },500);
    // 상태 복원 (initialSimState가 있으면 iframe 안에서 처리)
    setTimeout(function(){ startAutoTrack(); },800);
  };

  container.appendChild(iframe);
}

// ── postMessage 수신 (iframe → parent) ──
var _lastInputs={}, _lastThumb=null;
window.addEventListener('message',function(e){
  if(!e.data||!e.data.type)return;
  if(e.data.type==='simAlive'){
    // 학생 접속 즉시 신호 → 빈 상태라도 카드 생성
    doReport({mode:'접속됨',_inputs:{},thumbnail:null});
  } else if(e.data.type==='simState'){
    _customState=e.data.state;
    if(_lastThumb) _customState.thumbnail=_lastThumb;
    doReport(_customState);
  } else if(e.data.type==='simThumb'){
    _lastThumb=e.data.data;
    if(_customState){_customState.thumbnail=_lastThumb;doReport(_customState);}
    else doReport({thumbnail:_lastThumb,mode:'활동중',_inputs:_lastInputs});
  } else if(e.data.type==='simPieces'){
    // .pc 퍼즐 조각 위치 수신
    var pieceState=Object.assign({},_customState||{},{
      pos:e.data.pos,
      mode:e.data.mode||(_customState&&_customState.mode)||'활동중',
      thumbnail:_lastThumb||undefined,
      _inputs:_lastInputs
    });
    _customState=pieceState;
    doReport(pieceState);
  } else if(e.data.type==='simInputs'){
    _lastInputs=e.data.inputs;
    var inp=Object.assign({},_customState||{},{_inputs:_lastInputs,thumbnail:_lastThumb||undefined});
    // sA/sB 슬라이더는 a/b로도 저장
    if(_lastInputs.sA!==undefined) inp.a=parseInt(_lastInputs.sA);
    if(_lastInputs.sB!==undefined) inp.b=parseInt(_lastInputs.sB);
    doReport(inp);
  }
});

// ── 상태 복원 (교사가 학생 카드 클릭 시) ──
function restoreSimState(){
  var _s=window.initialSimState;
  if(!_s) return;
  // Step1: 슬라이더/셀렉터 값 복원
  if(_s._inputs){
    Object.keys(_s._inputs).forEach(function(id){
      var el=document.getElementById(id);
      if(!el)return;
      el.value=_s._inputs[id];
      el.dispatchEvent(new Event('input',{bubbles:true}));
      el.dispatchEvent(new Event('change',{bubbles:true}));
    });
  }
  // Step2: .pc 조각 위치 복원 (슬라이더 이벤트로 위치 리셋된 후에 덮어쓰기)
  if(_s.pos&&_s.pos.length){
    setTimeout(function(){
      var c=document.getElementById('simContainer');
      if(!c)return;
      var arEl=c.querySelector('#ar');
      if(!arEl)return;
      var aw=arEl.offsetWidth,ah=arEl.offsetHeight;
      if(!aw||!ah)return;
      var pieces=arEl.querySelectorAll('.pc');
      _s.pos.forEach(function(p,i){
        if(!pieces[i])return;
        pieces[i].style.left  =(p.x*aw)+'px';
        pieces[i].style.top   =(p.y*ah)+'px';
        if(p.w) pieces[i].style.width =(p.w*aw)+'px';
        if(p.h) pieces[i].style.height=(p.h*ah)+'px';
      });
    },350);
  }
}

// ── 자동 추적 시스템 ──
var _autoInterval=null,_autoTimer=null,_customState=null;

function startAutoTrack(){
  // iframe 방식에서는 postMessage로 처리되므로 별도 추적 불필요
  // 단, iframe이 아닌 경우(레거시) 폴백
  var frame=document.getElementById('simFrame');
  if(frame)return; // iframe 있으면 postMessage가 처리
  var c=document.getElementById('simContainer');
  if(!c)return;
  c.addEventListener('input',function(e){
    if(e.target.type==='range'||e.target.tagName==='SELECT'||e.target.type==='number')
      scheduleAutoReport();
  });
  c.addEventListener('click',function(e){
    if(e.target.tagName==='BUTTON') scheduleAutoReport();
  });
  c.addEventListener('mouseup',scheduleAutoReport);
  c.addEventListener('touchend',scheduleAutoReport);
  if(_autoInterval)clearInterval(_autoInterval);
  _autoInterval=setInterval(function(){
    if(!document.getElementById('simContainer')){clearInterval(_autoInterval);return;}
    collectAndReport();
  },1200);
  setTimeout(collectAndReport,300);
  setTimeout(collectAndReport,800);
  setTimeout(collectAndReport,1600);
}

function scheduleAutoReport(){
  clearTimeout(_autoTimer);
  _autoTimer=setTimeout(collectAndReport,350);
}

function collectAndReport(){
  var c=document.getElementById('simContainer');
  if(!c)return;
  // ① 슬라이더/셀렉터 값 수집
  var inputs={};
  c.querySelectorAll('input[type=range],input[type=number],select').forEach(function(el,i){
    var k=el.id||el.name||('f'+i);
    inputs[k]=isNaN(parseFloat(el.value))?el.value:parseFloat(el.value);
  });
  // ② .pc 드래그 조각 위치 수집 (퍼즐형 시뮬레이션)
  var posData=captureGamePieces(c);
  // ③ 썸네일 캡처 (SVG 우선, 없으면 Canvas)
  var thumb=captureSVGThumb(c)||captureCanvasThumb(c);
  // 상태 합성
  var state=Object.assign({},_customState||{},{_inputs:inputs});
  if(posData) state.pos=posData;
  if(thumb)   state.thumbnail=thumb;
  if(!state.mode) state.mode='활동중';
  // a, b 슬롯 (커스텀 없을 때 sA/sB 자동 매핑)
  if(_customState===null){
    var sA=document.getElementById('sA'),sB=document.getElementById('sB');
    if(sA) state.a=parseInt(sA.value);
    if(sB) state.b=parseInt(sB.value);
    if(state.a===undefined){
      var keys=Object.keys(inputs);
      if(keys[0]!==undefined) state.a=inputs[keys[0]];
      if(keys[1]!==undefined) state.b=inputs[keys[1]];
    }
    // curMode 캡처 시도 (시뮬레이션 전역 변수)
    try{
      var c=document.getElementById('simContainer');
      if(c){
        var scripts=c.parentNode?c.parentNode.querySelectorAll('script'):[];
        // curMode는 시뮬레이션 내부 변수라 직접 접근 불가
        // 대신 활동중으로 표시
        if(!state.mode) state.mode='활동중';
      }
    }catch(ex){}
  }
  doReport(state);
}

// .pc 드래그 조각 위치 캡처
function captureGamePieces(container){
  var arEl=container.querySelector('#ar');
  if(!arEl)return null;
  var pieces=arEl.querySelectorAll('.pc');
  if(!pieces.length)return null;
  var aw=arEl.offsetWidth||arEl.getBoundingClientRect().width;
  var ah=arEl.offsetHeight||arEl.getBoundingClientRect().height;
  if(!aw||!ah)return null;
  var result=Array.prototype.map.call(pieces,function(el){
    var left=parseFloat(el.style.left)||0;
    var top=parseFloat(el.style.top)||0;
    var w=parseFloat(el.style.width)||(el.offsetWidth)||0;
    var h=parseFloat(el.style.height)||(el.offsetHeight)||0;
    return{x:left/aw, y:top/ah, w:w/aw, h:h/ah};
  });
  // 모든 값이 0이면 레이아웃 미완성 → null 반환
  var allZero=result.every(function(p){return p.w===0&&p.h===0;});
  return allZero?null:result;
}

// SVG 썸네일 캡처
function captureSVGThumb(container){
  var svgs=container.querySelectorAll('svg');
  var svg=null;
  svgs.forEach(function(s){if(s.id!=='opc'&&s.getBBox)svg=s;});
  if(!svg)return null;
  try{
    var s=new XMLSerializer().serializeToString(svg);
    if(s.indexOf('var(--')>=0||s.length>60000)return null;
    return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(s)));
  }catch(e){return null;}
}

// Canvas 썸네일 캡처 (확률실험, 히스토그램, 그래프 등)
function captureCanvasThumb(container){
  // opc(오버레이)가 아닌 메인 캔버스 찾기
  var canvases=container.querySelectorAll('canvas');
  var cv=null;
  canvases.forEach(function(c){
    if(c.id!=='opc'&&c.width>50&&c.height>50) cv=c;
  });
  if(!cv)return null;
  try{
    // 내용이 있는지 확인 (빈 캔버스 제외)
    var ctx=cv.getContext('2d');
    var d=ctx.getImageData(0,0,Math.min(cv.width,100),Math.min(cv.height,100)).data;
    var hasContent=false;
    for(var i=3;i<d.length;i+=4){if(d[i]>10){hasContent=true;break;}}
    if(!hasContent)return null;
    // 썸네일 크기 축소 (200x150으로 리샘플)
    var thumb=document.createElement('canvas');
    thumb.width=200;thumb.height=150;
    var tctx=thumb.getContext('2d');
    tctx.drawImage(cv,0,0,200,150);
    return thumb.toDataURL('image/jpeg',0.7);
  }catch(e){return null;}
}

// ── 상태 보고 함수 ──
// 시뮬레이션이 직접 호출: window.reportSimState(state)
// 자동 추적과 병합됨
window.reportSimState=function(state){
  _customState=state; // 커스텀 상태 저장 (자동추적이 병합에 사용)
  clearTimeout(reportTimer);
  reportTimer=setTimeout(function(){doReport(state);},280);
};

async function doReport(state){
  if(!sbClient||!sessionId||!studentName)return;
  var s=JSON.stringify(state);
  if(s===lastState)return;
  lastState=s;
  try{
    await sbClient.from('sim_states').upsert({
      session_id:sessionId,
      student_name:studentName,
      state:state,
      updated_at:new Date().toISOString()
    },{onConflict:'session_id,student_name'});
  }catch(e){console.log('report err',e);}
}
