name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 1 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          node -e "
          const https = require('https');
          const url = new URL('${{ secrets.SUPABASE_URL }}/rest/v1/simulations?select=id&limit=1');
          const options = {
            hostname: url.hostname,
            path: url.pathname + url.search,
            method: 'GET',
            headers: {
              'apikey': '${{ secrets.SUPABASE_KEY }}',
              'Authorization': 'Bearer ${{ secrets.SUPABASE_KEY }}'
            }
          };
          const req = https.request(options, (res) => {
            console.log('✅ 성공! 상태코드:', res.statusCode);
          });
          req.on('error', (e) => {
            console.error('❌ 실패:', e.message);
            process.exit(1);
          });
          req.end();
          "
